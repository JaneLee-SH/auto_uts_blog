name: UTS技术博客 每日8点自动发布
on:
  schedule:
    - cron: '0 0 * * 1-5'  # 北京时间 8:00 工作日发
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装依赖
        run: pip install requests python-dotenv markdown2
      - name: 运行AI自动化发布
        run: python main.py
